<head>
    <meta charset="UTF-8">

    <title>DevaAI - Project Generator</title>
    <style>
        :root {
            --color-bg-primary: #0f172a;
            --color-bg-secondary: #1e293b;
            --color-bg-tertiary: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-accent: #38bdf8;
            --color-accent-hover: #0ea5e9;
            --color-success: #10b981;
            --color-warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
            color: var(--color-text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--color-accent) 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
        }

        .generator-section {
            background: var(--color-bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--color-bg-tertiary);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon {
            font-size: 1.8rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .gen-button {
            background: var(--color-bg-tertiary);
            border: 2px solid var(--color-accent);
            color: var(--color-text-primary);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .gen-button:hover {
            background: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .gen-button .button-title {
            font-size: 1.1rem;
        }

        .gen-button .button-desc {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            font-weight: normal;
        }

        .output-area {
            background: #000;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #00ff00;
            border: 1px solid var(--color-accent);
            display: none;
        }

        .output-area.active {
            display: block;
        }

        .output-area pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .status.loading {
            background: var(--color-warning);
            color: #000;
        }

        .status.success {
            background: var(--color-success);
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .action-btn {
            background: var(--color-accent);
            color: var(--color-bg-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--color-accent-hover);
            transform: scale(1.05);
        }

        .file-tree {
            background: var(--color-bg-tertiary);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .tree-item {
            padding: 0.3rem 0;
            color: var(--color-text-secondary);
        }

        .tree-folder {
            color: var(--color-accent);
            font-weight: 600;
        }

        .copy-notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--color-success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .copy-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

-- DevaAI PostgreSQL Schema
-- Production-ready with indexes and constraints

-- Enable UUID extension
CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

-- USERS TABLE
CREATE TABLE users (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    name VARCHAR(100) NOT NULL,
    email VARCHAR(255) UNIQUE NOT NULL,
    phone VARCHAR(15) UNIQUE NOT NULL,
    password_hash VARCHAR(255) NOT NULL,
    preferred_language VARCHAR(10) DEFAULT 'kn',
    preferred_deity VARCHAR(50),
    birth_nakshatra VARCHAR(50),
    district VARCHAR(50),
    is_premium BOOLEAN DEFAULT FALSE,
    is_admin BOOLEAN DEFAULT FALSE,
    premium_expiry TIMESTAMP,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_users_email ON users(email);
CREATE INDEX idx_users_phone ON users(phone);
CREATE INDEX idx_users_premium ON users(is_premium);

-- TEMPLES TABLE
CREATE TABLE temples (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    name VARCHAR(200) NOT NULL,
    state VARCHAR(50) DEFAULT 'Karnataka',
    district VARCHAR(50) NOT NULL,
    deity VARCHAR(100) NOT NULL,
    description TEXT,
    opening_time TIME,
    closing_time TIME,
    address TEXT,
    latitude DECIMAL(10, 8),
    longitude DECIMAL(11, 8),
    image_url VARCHAR(500),
    is_featured BOOLEAN DEFAULT FALSE,
    is_active BOOLEAN DEFAULT TRUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_temples_district ON temples(district);
CREATE INDEX idx_temples_deity ON temples(deity);
CREATE INDEX idx_temples_featured ON temples(is_featured);
CREATE INDEX idx_temples_location ON temples(latitude, longitude);

-- BUSINESS_LISTINGS TABLE
CREATE TABLE business_listings (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    temple_id UUID REFERENCES temples(id) ON DELETE CASCADE,
    shop_name VARCHAR(200) NOT NULL,
    owner_name VARCHAR(100) NOT NULL,
    phone VARCHAR(15) NOT NULL,
    address TEXT,
    business_type VARCHAR(50),
    description TEXT,
    is_premium BOOLEAN DEFAULT FALSE,
    expiry_date DATE,
    is_active BOOLEAN DEFAULT TRUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_business_temple ON business_listings(temple_id);
CREATE INDEX idx_business_premium ON business_listings(is_premium);
CREATE INDEX idx_business_expiry ON business_listings(expiry_date);

-- FESTIVALS TABLE
CREATE TABLE festivals (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    name VARCHAR(200) NOT NULL,
    date DATE NOT NULL,
    state VARCHAR(50) DEFAULT 'Karnataka',
    district VARCHAR(50),
    associated_deity VARCHAR(100),
    description TEXT,
    notification_sent BOOLEAN DEFAULT FALSE,
    is_active BOOLEAN DEFAULT TRUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_festivals_date ON festivals(date);
CREATE INDEX idx_festivals_district ON festivals(district);
CREATE INDEX idx_festivals_notification ON festivals(notification_sent);

-- SLOKAS TABLE
CREATE TABLE slokas (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    sloka_text TEXT NOT NULL,
    meaning TEXT NOT NULL,
    deity_tag VARCHAR(50),
    language VARCHAR(10) DEFAULT 'kn',
    is_active BOOLEAN DEFAULT TRUE,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_slokas_deity ON slokas(deity_tag);
CREATE INDEX idx_slokas_active ON slokas(is_active);

-- AI_LOGS TABLE
CREATE TABLE ai_logs (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    user_id UUID REFERENCES users(id) ON DELETE CASCADE,
    question TEXT NOT NULL,
    response TEXT NOT NULL,
    tokens_used INTEGER,
    model_version VARCHAR(50),
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

CREATE INDEX idx_ai_logs_user ON ai_logs(user_id);
CREATE INDEX idx_ai_logs_created ON ai_logs(created_at);

-- SUBSCRIPTION_TRANSACTIONS TABLE
CREATE TABLE subscription_transactions (
    id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
    user_id UUID REFERENCES users(id) ON DELETE CASCADE,
    razorpay_order_id VARCHAR(100) UNIQUE,
    razorpay_payment_id VARCHAR(100),
    razorpay_subscription_id VARCHAR(100),
    amount DECIMAL(10, 2) NOT NULL,
    currency VARCHAR(3) DEFAULT 'INR',
    status VARCHAR(20) DEFAULT 'created',
    plan_duration INTEGER,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    completed_at TIMESTAMP
);

CREATE INDEX idx_transactions_user ON subscription_transactions(user_id);
CREATE INDEX idx_transactions_order ON subscription_transactions(razorpay_order_id);
CREATE INDEX idx_transactions_status ON subscription_transactions(status);

-- Trigger for updated_at timestamp
CREATE OR REPLACE FUNCTION update_updated_at_column()
RETURNS TRIGGER AS $$
BEGIN
    NEW.updated_at = CURRENT_TIMESTAMP;
    RETURN NEW;
END;
$$ language 'plpgsql';

CREATE TRIGGER update_users_updated_at BEFORE UPDATE ON users
FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

CREATE TRIGGER update_temples_updated_at BEFORE UPDATE ON temples
FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

CREATE TRIGGER update_business_updated_at BEFORE UPDATE ON business_listings
FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

# app/services/auth_service.py
from datetime import datetime, timedelta
from jose import JWTError, jwt
from passlib.context import CryptContext
from app.config import settings

pwd_context = CryptContext(schemes=["bcrypt"], deprecated="auto")

def verify_password(plain_password: str, hashed_password: str) -> bool:
    return pwd_context.verify(plain_password, hashed_password)

def get_password_hash(password: str) -> str:
    return pwd_context.hash(password)

def create_access_token(data: dict) -> str:
    to_encode = data.copy()
    expire = datetime.utcnow() + timedelta(minutes=settings.ACCESS_TOKEN_EXPIRE_MINUTES)
    to_encode.update({"exp": expire})
    encoded_jwt = jwt.encode(to_encode, settings.SECRET_KEY, algorithm=settings.ALGORITHM)
    return encoded_jwt

def decode_access_token(token: str):
    try:
        payload = jwt.decode(token, settings.SECRET_KEY, algorithms=[settings.ALGORITHM])
        return payload
    except JWTError:
        return None

from fastapi import Depends, HTTPException, status
from fastapi.security import HTTPBearer, HTTPAuthorizationCredentials
from sqlalchemy.orm import Session
from app.database import get_db
from app.models.user import User
from app.services.auth_service import decode_access_token

security = HTTPBearer()

def get_current_user(
    credentials: HTTPAuthorizationCredentials = Depends(security),
    db: Session = Depends(get_db)
) -> User:
    token = credentials.credentials
    payload = decode_access_token(token)
    
    if payload is None:
        raise HTTPException(
            status_code=status.HTTP_401_UNAUTHORIZED,
            detail="Invalid authentication credentials"
        )
    
    user_id = payload.get("sub")
    if user_id is None:
        raise HTTPException(
            status_code=status.HTTP_401_UNAUTHORIZED,
            detail="Invalid token payload"
        )
    
    user = db.query(User).filter(User.id == user_id).first()
    if user is None:
        raise HTTPException(
            status_code=status.HTTP_401_UNAUTHORIZED,
            detail="User not found"
        )
    
    return user

def get_admin_user(current_user: User = Depends(get_current_user)) -> User:
    if not current_user.is_admin:
        raise HTTPException(
            status_code=status.HTTP_403_FORBIDDEN,
            detail="Admin access required"
        )
    return current_user

from fastapi import APIRouter, Depends, HTTPException, status
from sqlalchemy.orm import Session
from app.database import get_db
from app.models.user import User
from app.schemas.auth import UserRegister, UserLogin, Token
from app.services.auth_service import verify_password, get_password_hash, create_access_token

router = APIRouter()

@router.post("/register", response_model=Token)
def register(user_data: UserRegister, db: Session = Depends(get_db)):
    # Check if user exists
    existing_user = db.query(User).filter(
        (User.email == user_data.email) | (User.phone == user_data.phone)
    ).first()
    
    if existing_user:
        raise HTTPException(
            status_code=status.HTTP_400_BAD_REQUEST,
            detail="User with this email or phone already exists"
        )
    
    # Create new user
    new_user = User(
        name=user_data.name,
        email=user_data.email,
        phone=user_data.phone,
        password_hash=get_password_hash(user_data.password),
        preferred_language=user_data.preferred_language,
        district=user_data.district
    )
    
    db.add(new_user)
    db.commit()
    db.refresh(new_user)
    
    # Generate token
    access_token = create_access_token(data={"sub": str(new_user.id)})
    
    return {"access_token": access_token, "token_type": "bearer"}

@router.post("/login", response_model=Token)
def login(credentials: UserLogin, db: Session = Depends(get_db)):
    user = db.query(User).filter(User.email == credentials.email).first()
    
    if not user or not verify_password(credentials.password, user.password_hash):
        raise HTTPException(
            status_code=status.HTTP_401_UNAUTHORIZED,
            detail="Incorrect email or password"
        )
    
    access_token = create_access_token(data={"sub": str(user.id)})
    
    return {"access_token": access_token, "token_type": "bearer"}

def get_temples(
    district: Optional[str] = None,
    deity: Optional[str] = None,
    featured: Optional[bool] = None,
    skip: int = 0,
    limit: int = 20,
    db: Session = Depends(get_db)
):
    query = db.query(Temple).filter(Temple.is_active == True)
    
    if district:
        query = query.filter(Temple.district == district)
    if deity:

            "name": t.name,
            "district": t.district,
            "deity": t.deity,

# frontend/public/sw.js
const CACHE_NAME = 'devaai-v1'
const urlsToCache = [
  '/',
  '/home',
  '/ask',
  '/temples',
  '/profile',
  '/offline'
]

self.addEventListener('install', (event) => {
  event.waitUntil(
    caches.open(CACHE_NAME)
      .then((cache) => cache.addAll(urlsToCache))
  )
})

self.addEventListener('fetch', (event) => {
  event.respondWith(
    caches.match(event.request)
      .then((response) => {
        if (response) {
          return response
        }
        return fetch(event.request).catch(() => {
          return caches.match('/offline')
        })
      })
  )
})

self.addEventListener('activate', (event) => {
  event.waitUntil(
    caches.keys().then((cacheNames) => {
      return Promise.all(
        cacheNames.map((cacheName) => {
          if (cacheName !== CACHE_NAME) {
            return caches.delete(cacheName)
          }
        })
      )
    })
  )
})

'use client'
import { useState } from 'react'
import { chatAPI } from '@/lib/api'

export default function AskPage() {
  const [messages, setMessages] = useState<any[]>([])
  const [input, setInput] = useState('')
  const [loading, setLoading] = useState(false)

  const sendMessage = async () => {
    if (!input.trim()) return

    const userMessage = { role: 'user', content: input }
    setMessages([...messages, userMessage])
    setInput('')
    setLoading(true)

    try {
      const response = await chatAPI.sendMessage(input)
      const aiMessage = { role: 'assistant', content: response.data.response }
      setMessages(prev => [...prev, aiMessage])
    } catch (error) {
      console.error('Failed to send message', error)
    } finally {
      setLoading(false)
    }
  }

  return (
    <div className="flex flex-col h-screen">
      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        {messages.map((msg, idx) => (
          <div
            key={idx}
            className={\`flex \${msg.role === 'user' ? 'justify-end' : 'justify-start'}\`}
          >
            <div
              className={\`max-w-[80%] rounded-lg p-3 \${
                msg.role === 'user'
                  ? 'bg-blue-500 text-white'
                  : 'bg-gray-200 text-gray-800'
              }\`}
            >
              {msg.content}
            </div>
          </div>
        ))}
        {loading && <div className="text-center text-gray-500">Typing...</div>}
      </div>

      <div className="p-4 bg-white border-t">
        <div className="flex gap-2">
          <input
            type="text"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
            placeholder="ನಿಮ್ಮ ಪ್ರಶ್ನೆ ಕೇಳಿ..."
            className="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2"
          />
          <button
            onClick={sendMessage}
            disabled={loading}
            className="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:opacity-50"
          >
            ಕಳುಹಿಸಿ
          </button>
        </div>
      </div>
    </div>
  )
}

# docs/setup.md

# DevaAI Setup Guide

## Prerequisites
- Python 3.11+
- Node.js 18+
- PostgreSQL 15+
- Git

## Backend Setup

1. **Clone repository**
\`\`\`bash
git clone https://github.com/yourusername/devaai-platform.git
cd devaai-platform/backend
\`\`\`

2. **Create virtual environment**
\`\`\`bash
python -m venv venv
source venv/bin/activate  # On Windows: venv\\Scripts\\activate
\`\`\`

3. **Install dependencies**
\`\`\`bash
pip install -r requirements.txt
\`\`\`

4. **Setup environment variables**
\`\`\`bash
cp .env.example .env
# Edit .env with your actual values
\`\`\`

5. **Run migrations**
\`\`\`bash
alembic upgrade head
\`\`\`

6. **Start server**
\`\`\`bash
uvicorn app.main:app --reload --port 8000
\`\`\`

## Frontend Setup

1. **Navigate to frontend**
\`\`\`bash
cd ../frontend
\`\`\`

2. **Install dependencies**
\`\`\`bash
npm install
\`\`\`

3. **Setup environment**
\`\`\`bash
cp .env.local.example .env.local
# Edit .env.local with your values
\`\`\`

4. **Run development server**
\`\`\`bash
npm run dev
\`\`\`

## Database Setup (Supabase)

1. Create Supabase project at https://supabase.com
2. Copy SQL schema from \`backend/schema.sql\`
3. Run in Supabase SQL Editor
4. Get connection string from Settings > Database
5. Update DATABASE_URL in backend .env

## Production Deployment

### Backend (Render)
1. Create new Web Service on Render
2. Connect GitHub repository
3. Build Command: \`pip install -r requirements.txt\`
4. Start Command: \`uvicorn app.main:app --host 0.0.0.0 --port $PORT\`
5. Add environment variables from .env

### Frontend (Vercel)
1. Import project to Vercel
2. Framework: Next.js
3. Add environment variables
4. Deploy

## Testing
\`\`\`bash
# Backend tests
cd backend
pytest

# Frontend tests
cd frontend
npm test
\`\`\`

        function downloadOutput() {
            const outputArea = document.getElementById('outputArea');
            const text = outputArea.querySelector('pre').textContent;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'devaai-code.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
